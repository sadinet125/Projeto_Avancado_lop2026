<!DOCTYPE html>
<html>
  <head>
    <title>A-Frame: Carro com Movimentação</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // Componente para controlar a movimentação
      AFRAME.registerComponent('controle-carro', {
        schema: { velocidade: {type: 'number', default: 0.1} },
        init: function () {
          this.teclas = {};
          window.addEventListener('keydown', (e) => { this.teclas[e.key] = true; });
          window.addEventListener('keyup', (e) => { this.teclas[e.key] = false; });
        },
        tick: function () {
          let pos = this.el.getAttribute('position');
          if (this.teclas['w'] || this.teclas['ArrowUp']) pos.z -= this.schema.velocidade;
          if (this.teclas['s'] || this.teclas['ArrowDown']) pos.z += this.schema.velocidade;
          if (this.teclas['a'] || this.teclas['ArrowLeft']) pos.x -= this.schema.velocidade;
          if (this.teclas['d'] || this.teclas['ArrowRight']) pos.x += this.schema.velocidade;
          
          this.el.setAttribute('position', pos);
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

      <a-entity id="player" controle-carro position="0 0 5">
        
        <a-entity id="carro">
          <a-box position="0 0.5 0" width="1" height="0.5" depth="2" color="#4CC3D9"></a-box>
          <a-box position="0 0.9 0" width="0.8" height="0.4" depth="1" color="#FFF"></a-box>
          
          <a-cylinder position="-0.6 0.2 0.6" rotation="0 0 90" radius="0.2" height="0.1" color="#111"></a-cylinder>
          <a-cylinder position="0.6 0.2 0.6" rotation="0 0 90" radius="0.2" height="0.1" color="#111"></a-cylinder>
          <a-cylinder position="-0.6 0.2 -0.6" rotation="0 0 90" radius="0.2" height="0.1" color="#111"></a-cylinder>
          <a-cylinder position="0.6 0.2 -0.6" rotation="0 0 90" radius="0.2" height="0.1" color="#111"></a-cylinder>
        </a-entity>

        <a-entity camera position="0 2 4" rotation="-15 0 0" look-controls-enabled="false"></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
