<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Carro A-Frame</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Câmera -->
    <a-entity id="cameraRig" position="0 3 8">
      <a-camera></a-camera>
    </a-entity>

    <!-- Chão -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#7BC8A4"></a-plane>

    <!-- Carro -->
    <a-entity id="car" position="0 0.5 0">

      <!-- Corpo -->
      <a-box position="0 0 0" depth="2" height="0.5" width="1.5" color="red"></a-box>

      <!-- Cabine -->
      <a-box position="0 0.5 -0.3" depth="1" height="0.5" width="1.2" color="blue"></a-box>

      <!-- Rodas -->
      <a-cylinder position="0.7 -0.3 0.8" radius="0.3" height="0.2" rotation="90 0 0" color="black"></a-cylinder>
      <a-cylinder position="-0.7 -0.3 0.8" radius="0.3" height="0.2" rotation="90 0 0" color="black"></a-cylinder>
      <a-cylinder position="0.7 -0.3 -0.8" radius="0.3" height="0.2" rotation="90 0 0" color="black"></a-cylinder>
      <a-cylinder position="-0.7 -0.3 -0.8" radius="0.3" height="0.2" rotation="90 0 0" color="black"></a-cylinder>

    </a-entity>

  </a-scene>

  <script>
   
   
AFRAME.registerComponent('movimento-carro', {
  init: function () {

    this.position = { x: 0, z: 0 };

    window.addEventListener("keydown", (e) => {

      const speed = 0.2;

      if (e.key === "w") this.position.z -= speed;
      if (e.key === "s") this.position.z += speed;
      if (e.key === "a") this.position.x -= speed;
      if (e.key === "d") this.position.x += speed;

      // move o carro
      this.el.object3D.position.set(
        this.position.x,
        0.5,
        this.position.z
      );

      // move a câmera junto
      const cam = document.querySelector("#cameraRig");
      cam.object3D.position.set(
        this.position.x,
        3,
        this.position.z + 8
      );
    });
  }
});



  </script>

</body>
</html>
