<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Carro</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>
<body>
 
<a-scene>

  <a-entity position="4 0 5">
    <a-cylinder height="1.5" radius="0.2" color="brown" position="0 0.75 0"></a-cylinder>

    <a-sphere radius="0.8" color="green" position="0 2 0"></a-sphere>

  </a-entity>

  <!-- câmera -->
  <a-entity id="cameraRig" position="0 3 8">
    <a-camera wasd-controls-enabled="false" look-controls="enabled:false"></a-camera>
  </a-entity>

  <!-- chão -->
  <a-plane rotation="-90 0 0" width="200" height="200" color="gray"></a-plane>

  <!-- Linha da pista -->
  <a-plane rotation="-90 0 0" position="0 0.01 0" width="1.5" height="200" color="yellow"></a-plane>
  <!-- pista -->
  <a-plane rotation="-90 0 0" position="0 0.01 0" width="6" height="200" color="black"></a-plane>

  <!-- carro -->
  <a-entity id="car" position="0 0.5 0" rotation="0 0 0">

    <!-- corpo -->
    <a-box position="0 0 0" depth="2" height="0.5" width="1.5" color="green"></a-box>

    <!-- cabine -->
    <a-box position="0 0.5 -0.3" depth="1" height="0.5" width="1.2" color="green"></a-box>

    <!--
      RODAS: rotation="0 0 90" deixa o cilindro deitado (eixo no X).
      Assim a roda fica no plano certo e gira para frente ao mudar X da rotation.
    -->
    <a-cylinder id="roda-fd" position=" 0.85 -0.25  0.8" radius="0.25" height="0.15" rotation="0 0 90" color="black"></a-cylinder>
    <a-cylinder id="roda-fe" position="-0.85 -0.25  0.8" radius="0.25" height="0.15" rotation="0 0 90" color="black"></a-cylinder>
    <a-cylinder id="roda-td" position=" 0.85 -0.25 -0.8" radius="0.25" height="0.15" rotation="0 0 90" color="black"></a-cylinder>
    <a-cylinder id="roda-te" position="-0.85 -0.25 -0.8" radius="0.25" height="0.15" rotation="0 0 90" color="black"></a-cylinder>

  </a-entity>


</a-scene>

<script>
window.onload = function () {

  var car  = document.getElementById("car");
  var cam  = document.getElementById("cameraRig");
  var rodas = [
    document.getElementById("roda-fd"),
    document.getElementById("roda-fe"),
    document.getElementById("roda-td"),
    document.getElementById("roda-te")
  ];

  var posX    = 0;
  var posZ    = 0;
  var angulo  = 0;   // rotação Y do carro (graus)
  var rodaRot = 0;   // giro acumulado das rodas

  var vel  = 0.06;
  var giro = 2.0;

  var keys = {};
  window.addEventListener("keydown", function(e) { keys[e.key] = true; });
  window.addEventListener("keyup",   function(e) { keys[e.key] = false; });

  function loop() {
    requestAnimationFrame(loop);

    var dir = 0;
    if (keys["w"] || keys["W"] || keys["ArrowUp"])   dir =  1;
    if (keys["s"] || keys["S"] || keys["ArrowDown"]) dir = -1;

    if (dir !== 0) {
      // Vira enquanto em movimento
      if (keys["a"] || keys["A"] || keys["ArrowLeft"])  angulo += giro * dir;
      if (keys["d"] || keys["D"] || keys["ArrowRight"]) angulo -= giro * dir;

      // Move na direção que o carro aponta
      var rad = angulo * Math.PI / 180;
      posX -= Math.sin(rad) * vel * dir;
      posZ -= Math.cos(rad) * vel * dir;

      // rotacao das rodas
      rodaRot += 3 * dir;
      rodas.forEach(function(r) {
        r.setAttribute("rotation", rodaRot + " 0 90");
      });
    }

    // atualiza o carro
    car.setAttribute("position", posX + " 0.5 " + posZ);
    car.setAttribute("rotation", "0 " + angulo + " 0");

    // camera atrás do carro
    var rad  = angulo * Math.PI / 180;
    var camX = posX + Math.sin(rad) * 8;
    var camZ = posZ + Math.cos(rad) * 8;
    cam.setAttribute("position", camX + " 3 " + camZ);
    cam.setAttribute("rotation", "0 " + angulo + " 0");
  }

  loop();
};
</script>

</body>
</html>
