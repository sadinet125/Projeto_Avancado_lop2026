<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora IMC</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            margin-bottom: 5px;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background-color: #64748b;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #475569;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Calculadora IMC</h1>

        <div class="campo">
            <label for="altura">Altura (m)</label>
            <input type="number" id="altura" placeholder="Ex: 1.80" step="0.01">
        </div>

        <div class="campo">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" placeholder="Ex: 70" step="0.01">
        </div>

        <button id="btn">Descubra seu IMC</button>

        <h2 id="resultado"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
